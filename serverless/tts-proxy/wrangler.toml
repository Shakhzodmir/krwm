name = "km-tts"
main = "worker.js"
compatibility_date = "2024-11-01"

# CORS: воркером могут пользоваться только страницы этих сайтов
# (список через запятую; "*" — разрешить всем).
[vars]
ALLOWED_ORIGIN = "https://koreanmadie.study, https://koreanmadie.web.app, https://koreanmadie.firebaseapp.com"

# Секрет GOOGLE_TTS_KEY здесь НЕ указывается — он задаётся отдельно:
#   wrangler secret put GOOGLE_TTS_KEY
