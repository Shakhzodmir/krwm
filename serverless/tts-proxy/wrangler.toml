name = "km-tts"
main = "worker.js"
compatibility_date = "2024-11-01"

# CORS: для безопасности замени "*" на адрес сайта,
# например "https://madie.example.com". Тогда воркером смогут
# пользоваться только страницы твоего сайта.
[vars]
ALLOWED_ORIGIN = "*"

# Секрет GOOGLE_TTS_KEY здесь НЕ указывается — он задаётся отдельно:
#   wrangler secret put GOOGLE_TTS_KEY
