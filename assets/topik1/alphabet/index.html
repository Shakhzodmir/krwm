<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>한글 · Korean Alphabet — Korean with Madie</title>
<style>
  :root{
    --pink:#ff7eb6; --pink-soft:#ffd9ea; --cream:#fff8fb; --ink:#4a3a44;
    --muted:#9b8791; --line:#f3dbe7; --card:#ffffff; --gold:#f6b73c;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:linear-gradient(180deg,#fff5fa,#fdeef6);
    color:var(--ink); font-family:"Segoe UI",system-ui,-apple-system,"Malgun Gothic",sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:920px; margin:0 auto; padding:28px 18px 56px}
  header{text-align:center; padding:18px 0 8px}
  .brand{font-size:13px; letter-spacing:.32em; color:var(--pink); font-weight:700; text-transform:uppercase}
  h1{margin:.25em 0 .1em; font-size:38px; letter-spacing:.01em}
  .sub{color:var(--muted); font-size:15px; margin:0}
  .flower{color:var(--pink-soft)}
  section{margin-top:30px}
  .sec-head{display:flex; align-items:baseline; gap:10px; margin:0 4px 14px; padding-bottom:8px; border-bottom:2px dashed var(--line)}
  .sec-head .ko{font-size:24px; font-weight:800}
  .sec-head .ru{color:var(--muted); font-size:14px}
  .sec-head .count{margin-left:auto; font-size:13px; color:var(--pink); font-weight:700; background:var(--pink-soft); padding:3px 10px; border-radius:999px}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:18px;
    padding:14px 12px 12px; text-align:center; position:relative; overflow:hidden;
    box-shadow:0 6px 16px rgba(255,126,182,.07); transition:transform .15s, box-shadow .15s;
  }
  .card:hover{transform:translateY(-3px); box-shadow:0 12px 26px rgba(255,126,182,.16)}
  .glyph{font-size:54px; line-height:1; font-weight:800; color:var(--ink); margin:2px 0 6px}
  .romaja{position:absolute; top:10px; right:12px; font-size:12px; color:var(--pink); font-weight:700}
  .names{font-size:15px; font-weight:700}
  .names .ru{display:block; font-size:12px; color:var(--muted); font-weight:600; margin-top:1px}
  .sound{margin:6px 0 8px; font-size:13px; color:var(--gold); font-weight:700}
  .ex{border-top:1px dashed var(--line); padding-top:8px; font-size:13px}
  .ex .w{font-size:18px; font-weight:700}
  .ex .m{display:block; color:var(--muted); font-size:11.5px; margin-top:1px}
  footer{margin-top:40px; text-align:center; color:var(--muted); font-size:12.5px}
  .tools{text-align:center; margin:18px 0 0}
  .tools button{
    border:none; background:var(--pink); color:#fff; font-weight:700; font-size:14px;
    padding:9px 18px; border-radius:999px; cursor:pointer; box-shadow:0 6px 14px rgba(255,126,182,.3)
  }
  @media print{
    body{background:#fff} .tools{display:none}
    .card{box-shadow:none; break-inside:avoid}
    .card:hover{transform:none; box-shadow:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">❀ Korean with Madie ❀</div>
    <h1>한글 <span class="flower">·</span> Корейский алфавит</h1>
    <p class="sub">자음 14 · 모음 10 · 쌍자음 5 — название, звук, транскрипция и пример</p>
  </header>

  <div id="root"></div>

  <div class="tools"><button onclick="window.print()">🖨️ Печать / Сохранить в PDF</button></div>

  <footer>❀ Korean with Madie — фирменный набор для изучения 한글 ❀</footer>
</div>

<script>
const DATA = {
  consonants:[
    {char:"ㄱ",name_ko:"기역",name_ru:"киёк",sound:"[к, г]",romaja:"g / k",example:{word:"가방",ru:"сумка"}},
    {char:"ㄴ",name_ko:"니은",name_ru:"ниын",sound:"[н]",romaja:"n",example:{word:"나무",ru:"дерево"}},
    {char:"ㄷ",name_ko:"디귿",name_ru:"тигыт",sound:"[т, д]",romaja:"d / t",example:{word:"다리",ru:"нога / мост"}},
    {char:"ㄹ",name_ko:"리을",name_ru:"риыль",sound:"[р, ль]",romaja:"r / l",example:{word:"라면",ru:"рамён"}},
    {char:"ㅁ",name_ko:"미음",name_ru:"миым",sound:"[м]",romaja:"m",example:{word:"물",ru:"вода"}},
    {char:"ㅂ",name_ko:"비읍",name_ru:"пиып",sound:"[п, б]",romaja:"b / p",example:{word:"바다",ru:"море"}},
    {char:"ㅅ",name_ko:"시옷",name_ru:"сиот",sound:"[с]",romaja:"s",example:{word:"사과",ru:"яблоко"}},
    {char:"ㅇ",name_ko:"이응",name_ru:"иын",sound:"[–, нъ]",romaja:"ng / —",example:{word:"아이",ru:"ребёнок"}},
    {char:"ㅈ",name_ko:"지읒",name_ru:"чиыт",sound:"[ч, дж]",romaja:"j",example:{word:"주스",ru:"сок"}},
    {char:"ㅊ",name_ko:"치읓",name_ru:"чхиыт",sound:"[чх]",romaja:"ch",example:{word:"책",ru:"книга"}},
    {char:"ㅋ",name_ko:"키읔",name_ru:"кхиык",sound:"[кх]",romaja:"k",example:{word:"커피",ru:"кофе"}},
    {char:"ㅌ",name_ko:"티읕",name_ru:"тхиыт",sound:"[тх]",romaja:"t",example:{word:"토마토",ru:"помидор"}},
    {char:"ㅍ",name_ko:"피읖",name_ru:"пхиып",sound:"[пх]",romaja:"p",example:{word:"포도",ru:"виноград"}},
    {char:"ㅎ",name_ko:"히읗",name_ru:"хиыт",sound:"[х]",romaja:"h",example:{word:"하늘",ru:"небо"}}
  ],
  vowels:[
    {char:"ㅏ",name_ko:"아",name_ru:"а",sound:"[а]",romaja:"a",example:{word:"사람",ru:"человек"}},
    {char:"ㅑ",name_ko:"야",name_ru:"я",sound:"[я]",romaja:"ya",example:{word:"야구",ru:"бейсбол"}},
    {char:"ㅓ",name_ko:"어",name_ru:"о (тёмное)",sound:"[ŏ]",romaja:"eo",example:{word:"어머니",ru:"мама"}},
    {char:"ㅕ",name_ko:"여",name_ru:"ё (тёмное)",sound:"[yŏ]",romaja:"yeo",example:{word:"여자",ru:"женщина"}},
    {char:"ㅗ",name_ko:"오",name_ru:"о",sound:"[о]",romaja:"o",example:{word:"오이",ru:"огурец"}},
    {char:"ㅛ",name_ko:"요",name_ru:"ё",sound:"[ё]",romaja:"yo",example:{word:"요리",ru:"готовка"}},
    {char:"ㅜ",name_ko:"우",name_ru:"у",sound:"[у]",romaja:"u",example:{word:"우유",ru:"молоко"}},
    {char:"ㅠ",name_ko:"유",name_ru:"ю",sound:"[ю]",romaja:"yu",example:{word:"유리",ru:"стекло"}},
    {char:"ㅡ",name_ko:"으",name_ru:"ы",sound:"[ы]",romaja:"eu",example:{word:"그림",ru:"рисунок"}},
    {char:"ㅣ",name_ko:"이",name_ru:"и",sound:"[и]",romaja:"i",example:{word:"기차",ru:"поезд"}}
  ],
  double_consonants:[
    {char:"ㄲ",name_ko:"쌍기역",name_ru:"ссангиёк",sound:"[кк]",romaja:"kk",example:{word:"토끼",ru:"кролик"}},
    {char:"ㄸ",name_ko:"쌍디귿",name_ru:"ссандигыт",sound:"[тт]",romaja:"tt",example:{word:"딸기",ru:"клубника"}},
    {char:"ㅃ",name_ko:"쌍비읍",name_ru:"ссанбиып",sound:"[пп]",romaja:"pp",example:{word:"빵",ru:"хлеб"}},
    {char:"ㅆ",name_ko:"쌍시옷",name_ru:"ссансиот",sound:"[сс]",romaja:"ss",example:{word:"쌀",ru:"рис (сырой)"}},
    {char:"ㅉ",name_ko:"쌍지읒",name_ru:"ссанчиыт",sound:"[чч]",romaja:"jj",example:{word:"찌개",ru:"чигэ (суп)"}}
  ]
};

function card(it){
  return `<div class="card">
    <div class="romaja">${it.romaja}</div>
    <div class="glyph">${it.char}</div>
    <div class="names">${it.name_ko}<span class="ru">${it.name_ru}</span></div>
    <div class="sound">${it.sound}</div>
    <div class="ex"><span class="w">${it.example.word}</span><span class="m">${it.example.ru}</span></div>
  </div>`;
}
function section(ko,ru,items){
  return `<section>
    <div class="sec-head"><span class="ko">${ko}</span><span class="ru">${ru}</span><span class="count">${items.length}</span></div>
    <div class="grid">${items.map(card).join("")}</div>
  </section>`;
}
document.getElementById("root").innerHTML =
  section("자음","Согласные",DATA.consonants) +
  section("모음","Гласные",DATA.vowels) +
  section("쌍자음","Двойные согласные",DATA.double_consonants);
</script>
</body>
</html>
